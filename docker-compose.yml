# Episteme - Local Development Environment
#
# Production equivalent: AWS RDS PostgreSQL with pgvector
#
# Usage:
#   docker compose up -d        # Start Postgres
#   docker compose down         # Stop
#   docker compose down -v      # Stop and reset data

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: episteme-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: episteme
      POSTGRES_PASSWORD: episteme_dev
      POSTGRES_DB: episteme
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U episteme"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: episteme-network
