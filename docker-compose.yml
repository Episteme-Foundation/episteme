# Episteme - Local Development Environment
#
# Production equivalents:
#   neo4j      -> Neo4j Aura (managed)
#   postgres   -> AWS RDS PostgreSQL
#   redis      -> AWS ElastiCache
#   qdrant     -> Pinecone (managed) - Qdrant used locally for development
#
# Usage:
#   docker compose up -d        # Start all services
#   docker compose down         # Stop all services
#   docker compose logs -f      # Follow logs
#   docker compose down -v      # Stop and remove volumes (reset data)

services:
  # Graph Database - stores claim relationships and decomposition trees
  neo4j:
    image: neo4j:5.17-community
    container_name: episteme-neo4j
    ports:
      - "7474:7474"  # HTTP (Browser)
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/episteme_dev
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Document Store - sources, audit logs, metadata
  postgres:
    image: postgres:16-alpine
    container_name: episteme-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=episteme
      - POSTGRES_PASSWORD=episteme_dev
      - POSTGRES_DB=episteme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U episteme"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Cache & Message Broker - for Celery task queue
  redis:
    image: redis:7-alpine
    container_name: episteme-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Vector Database - local alternative to Pinecone for development
  # In production, use Pinecone managed service instead
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: episteme-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  qdrant_data:

# Network configuration
networks:
  default:
    name: episteme-network
